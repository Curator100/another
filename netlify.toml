# WE, WOMAN — Netlify Configuration
# Supports PWA, silent updates, security headers

[build]
  publish = "."
  # No build command — static files served directly

# ─── Redirects ───
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/admin/"
  to = "/admin.html"
  status = 200

# SPA fallback — return index.html for all other routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Headers ───
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"

# Service Worker — no cache (always serve fresh for silent updates)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript"

# Manifest — short cache
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/manifest+json"

# HTML — no cache (always fresh for silent updates)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Icons — long cache (change filename to bust)
[[headers]]
  for = "/icon-*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

# Fonts / JS — long cache
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"
